<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавить в календарь</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
    }
    .card {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #fff;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 500;
      color: #333;
      background: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.3);
    }
    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <button type="button" class="btn" id="addToCalendar">Добавить в календарь</button>
  </div>

  <script>
    (function () {
      // 8 марта — поздравить маму
      var event = {
        title: '8 марта',
        start: new Date(2026, 2, 8, 9, 0),  // 8 марта 2026, 9:00
        end: new Date(2026, 2, 8, 10, 0),   // 8 марта 2026, 10:00
        location: '',
        description: 'поздравить маму с утра'
      };

      function formatICSDate(d) {
        return d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
      }

      function buildICS() {
        var ics = [
          'BEGIN:VCALENDAR',
          'VERSION:2.0',
          'PRODID:-//Calendar//RU',
          'CALSCALE:GREGORIAN',
          'BEGIN:VEVENT',
          'UID:' + (event.uid || Date.now() + '@local'),
          'DTSTAMP:' + formatICSDate(new Date()),
          'DTSTART:' + formatICSDate(event.start),
          'DTEND:' + formatICSDate(event.end),
          'SUMMARY:' + (event.title || 'Событие').replace(/\n/g, '\\n'),
          (event.location ? 'LOCATION:' + event.location.replace(/\n/g, '\\n') : ''),
          (event.description ? 'DESCRIPTION:' + event.description.replace(/\n/g, '\\n') : ''),
          'END:VEVENT',
          'END:VCALENDAR'
        ].filter(Boolean).join('\r\n');
        return ics;
      }

      function isMobile() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      }

      function doAddToCalendar() {
        var ics = buildICS();

        if (isMobile()) {
          // На мобильном (в т.ч. внутри Telegram) переходим на готовый .ics-файл
          window.location.href = 'event.ics';
        } else {
          // На десктопе — скачиваем .ics файл
          var blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = (event.title || 'event') + '.ics';
          a.click();
          URL.revokeObjectURL(url);
        }
      }

      document.getElementById('addToCalendar').addEventListener('click', doAddToCalendar);
    })();
  </script>
</body>
</html>
